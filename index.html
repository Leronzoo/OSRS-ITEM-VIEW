<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSRS Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a0e00;
            color: #f0d080;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at top, #2a1500 0%, #1a0e00 60%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle {
            position: absolute; width: 3px; height: 3px;
            background: #f0c040; border-radius: 50%; opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
        }

        .header { position: relative; z-index: 1; text-align: center; margin-bottom: 28px; }
        h1 {
            font-size: 2.2rem; color: #f0c040;
            text-shadow: 0 0 20px #f0a000aa, 0 2px 4px #000;
            letter-spacing: 2px; animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #f0a000aa, 0 2px 4px #000; }
            to   { text-shadow: 0 0 30px #f0c000ff, 0 0 60px #f0800044, 0 2px 4px #000; }
        }
        .subtitle { color: #a08040; font-size: 0.85rem; margin-top: 4px; letter-spacing: 1px; }

        /* ABAS */
        .tabs { display: flex; gap: 4px; margin-bottom: -1px; position: relative; z-index: 2; }
        .tab-btn {
            background: linear-gradient(180deg, #2a1800 0%, #1e1200 100%);
            color: #7a6030; border: 1px solid #5a3a10;
            border-bottom: none; padding: 8px 24px;
            border-radius: 4px 4px 0 0; cursor: pointer;
            font-size: 0.88rem; letter-spacing: 1px;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: #f0d080; }
        .tab-btn.active {
            background: linear-gradient(180deg, #3a2200 0%, #2a1800 100%);
            color: #f0c040; border-color: #c08030;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .panel {
            position: relative; z-index: 1;
            background: linear-gradient(180deg, #2a1a00 0%, #1e1200 100%);
            border: 1px solid #5a3a10; border-radius: 0 4px 4px 4px;
            padding: 16px; margin-bottom: 20px;
            box-shadow: 0 4px 20px #00000088, inset 0 1px 0 #6a4a2044;
        }
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #c08030, transparent);
        }

        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .controls label { color: #a08040; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .controls input, .controls select {
            background: #0e0800; border: 1px solid #5a3a10;
            color: #f0d080; padding: 6px 10px; border-radius: 2px;
            font-size: 0.85rem; outline: none; transition: border-color 0.2s;
        }
        .controls input:focus, .controls select:focus { border-color: #c08030; }
        input[type="text"] { width: 200px; }

        button {
            background: linear-gradient(180deg, #7a4a10 0%, #5a3000 100%);
            color: #f0d080; border: 1px solid #c08030;
            padding: 8px 20px; border-radius: 2px; cursor: pointer;
            font-size: 0.88rem; letter-spacing: 1px; transition: all 0.15s;
            text-shadow: 0 1px 2px #000; box-shadow: 0 2px 6px #00000066;
        }
        button:hover { background: linear-gradient(180deg, #9a5a18 0%, #7a4010 100%); border-color: #e0a040; }
        button:disabled { background: #2a1a00; color: #5a4020; border-color: #3a2210; cursor: not-allowed; }

        .status { color: #7a6030; font-size: 0.8rem; font-style: italic; }
        .contador { color: #6a5020; font-size: 0.78rem; margin-bottom: 10px; position: relative; z-index: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; position: relative; z-index: 1; }
        thead { position: sticky; top: 0; }
        th {
            background: linear-gradient(180deg, #3a2200 0%, #2a1800 100%);
            color: #c09040; text-align: left; padding: 8px 10px;
            border-bottom: 2px solid #5a3a10; border-right: 1px solid #3a2200;
            cursor: pointer; user-select: none; letter-spacing: 0.5px;
            font-size: 0.8rem; transition: color 0.15s;
        }
        th:hover { color: #f0d080; }
        td {
            padding: 6px 10px; border-bottom: 1px solid #2a1800;
            border-right: 1px solid #221200; transition: background 0.1s;
        }
        tr:hover td { background: #2a1800; }
        tr:nth-child(even) td { background: #1e1200; }
        tr:nth-child(even):hover td { background: #2a1800; }

        .empty { color: #4a3010; font-style: italic; padding: 20px 0; font-size: 0.85rem; }
        .badge { padding: 2px 7px; border-radius: 2px; font-size: 0.72rem; letter-spacing: 0.5px; font-weight: bold; }
        .badge-members { background: #1a3a10; color: #60c040; border: 1px solid #2a5a18; }
        .badge-free    { background: #101a3a; color: #4080cc; border: 1px solid #182858; }
        .gp { color: #f0c040; }
        .muted { color: #4a3820; }
        .pos { color: #60c040; }
        .neg { color: #c04040; }

        /* BONUSES */
        .bonus-toggle {
            background: none; border: 1px solid #5a3a10; color: #a08040;
            padding: 2px 7px; font-size: 0.7rem; cursor: pointer;
            border-radius: 2px; margin-top: 4px; letter-spacing: 0.5px;
        }
        .bonus-toggle:hover { border-color: #c08030; color: #f0d080; }
        .bonus-row td {
            background: #120c00 !important;
            padding: 8px 10px;
        }
        .bonus-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 6px;
        }
        .bonus-section { margin-bottom: 4px; }
        .bonus-section-title { color: #c08030; font-size: 0.72rem; font-weight: bold; margin-bottom: 3px; letter-spacing: 0.5px; }
        .bonus-item { display: flex; justify-content: space-between; font-size: 0.75rem; color: #a08040; padding: 1px 0; }
        .bonus-item span:last-child { font-weight: bold; }
        .loading-bonus { color: #5a4020; font-size: 0.75rem; font-style: italic; }

        .pagination {
            display: flex; gap: 8px; align-items: center;
            margin-top: 14px; position: relative; z-index: 1;
        }
        .pagination button { padding: 5px 14px; font-size: 0.8rem; }
        .pagination span { color: #7a6030; font-size: 0.82rem; }

        .divider { text-align: center; color: #5a3a10; font-size: 1.2rem; margin: 6px 0; letter-spacing: 8px; }

        /* GE específico */
        .margin-pos { color: #60c040; font-weight: bold; }
        .margin-neg { color: #c04040; }
        .vol { color: #8090c0; }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="header">
    <h1>⚔️ OSRS Grand Exchange ⚔️</h1>
    <div class="divider">— ✦ —</div>
    <p class="subtitle">Item Explorer · dados via OSRS Wiki API</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="trocarAba('npc')">🏪 Preços NPC</button>
    <button class="tab-btn" onclick="trocarAba('ge')">👥 Grand Exchange (Players)</button>
</div>

<!-- NPC -->
<div id="tab-npc" class="tab-content active">
    <div class="panel">
        <div class="controls">
            <label>🔍 Buscar: <input id="npc-search" type="text" placeholder="nome do item..."></label>
            <label>Tipo:
                <select id="npc-filterMembers">
                    <option value="">Todos</option>
                    <option value="true">Members</option>
                    <option value="false">Free to Play</option>
                </select>
            </label>
            <label>Limite GE mín:
                <input id="npc-filterLimit" type="number" value="0" min="0" style="width:80px">
            </label>
            <button onclick="carregarNPC()">▶ Carregar Itens</button>
            <span class="status" id="npc-status"></span>
        </div>
    </div>

    <div class="contador" id="npc-contador"></div>

    <div class="panel" style="padding:0;overflow:hidden;">
        <table>
            <thead>
                <tr>
                    <th onclick="sortNPC('id')">ID ↕</th>
                    <th onclick="sortNPC('name')">Nome ↕</th>
                    <th onclick="sortNPC('members')">Tipo ↕</th>
                    <th onclick="sortNPC('limit')">Limite GE ↕</th>
                    <th onclick="sortNPC('value')">Valor base ↕</th>
                    <th onclick="sortNPC('highalch')">High Alch ↕</th>
                    <th onclick="sortNPC('lowalch')">Low Alch ↕</th>
                </tr>
            </thead>
            <tbody id="npc-tbl">
                <tr><td colspan="7" class="empty" style="text-align:center">Clique em Carregar Itens</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination">
        <button onclick="mudarPaginaNPC(-1)">◀ Anterior</button>
        <span id="npc-pag-info">—</span>
        <button onclick="mudarPaginaNPC(1)">Próxima ▶</button>
    </div>
</div>

<!-- GE -->
<div id="tab-ge" class="tab-content">
    <div class="panel">
        <div class="controls">
            <label>🔍 Buscar: <input id="ge-search" type="text" placeholder="nome do item..."></label>
            <label>Tipo:
                <select id="ge-filterMembers">
                    <option value="">Todos</option>
                    <option value="true">Members</option>
                    <option value="false">Free to Play</option>
                </select>
            </label>
            <label>Margem mín (gp):
                <input id="ge-filterMargin" type="number" value="0" min="0" style="width:90px">
            </label>
            <button onclick="carregarGE()">▶ Carregar GE</button>
            <span class="status" id="ge-status"></span>
        </div>
    </div>

    <div class="contador" id="ge-contador"></div>

    <div class="panel" style="padding:0;overflow:hidden;">
        <table>
            <thead>
                <tr>
                    <th onclick="sortGE('name')">Nome ↕</th>
                    <th onclick="sortGE('members')">Tipo ↕</th>
                    <th onclick="sortGE('high')">Compra (high) ↕</th>
                    <th onclick="sortGE('low')">Venda (low) ↕</th>
                    <th onclick="sortGE('margin')">Margem ↕</th>
                    <th onclick="sortGE('volume')">Volume/dia ↕</th>
                    <th onclick="sortGE('limit')">Limite GE ↕</th>
                </tr>
            </thead>
            <tbody id="ge-tbl">
                <tr><td colspan="7" class="empty" style="text-align:center">Clique em Carregar GE</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination">
        <button onclick="mudarPaginaGE(-1)">◀ Anterior</button>
        <span id="ge-pag-info">—</span>
        <button onclick="mudarPaginaGE(1)">Próxima ▶</button>
    </div>
</div>

<script>
// partículas
const container = document.getElementById("particles")
for (let i = 0; i < 25; i++) {
    const p = document.createElement("div")
    p.className = "particle"
    p.style.left = Math.random() * 100 + "vw"
    p.style.width = (Math.random() * 3 + 1) + "px"
    p.style.height = p.style.width
    p.style.animationDuration = (Math.random() * 15 + 10) + "s"
    p.style.animationDelay = (Math.random() * 10) + "s"
    container.appendChild(p)
}

// abas
function trocarAba(aba) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
        const id = i === 0 ? 'npc' : 'ge'
        b.classList.toggle('active', id === aba)
    })
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
    document.getElementById('tab-' + aba).classList.add('active')
}

// mapping compartilhado
let MAPPING = []
async function carregarMapping() {
    if (MAPPING.length > 0) return MAPPING
    const res = await fetch("https://prices.runescape.wiki/api/v1/osrs/mapping", {
        headers: { "User-Agent": "osrs-explorer/1.0 - github.com/leronzoo" }
    })
    MAPPING = await res.json()
    return MAPPING
}

// NPC
let npcItens = [], npcFiltrados = [], npcPag = 0, npcSortCol = 'name', npcSortAsc = true
const POR_PAGINA = 50
const bonusCache = {}

async function carregarNPC() {
    document.getElementById('npc-status').textContent = "Baixando itens..."
    try {
        const data = await carregarMapping()
        npcItens = data.map(it => ({
            id: it.id, name: it.name || "", examine: it.examine || "",
            members: it.members || false, limit: it.limit || 0,
            value: it.value || 0, lowalch: it.lowalch || 0, highalch: it.highalch || 0,
        }))
        document.getElementById('npc-status').textContent = `✓ ${npcItens.length} itens`
        aplicarFiltrosNPC()
    } catch(e) {
        document.getElementById('npc-status').textContent = "Erro: " + e.message
    }
}

function aplicarFiltrosNPC() {
    const busca   = document.getElementById("npc-search").value.toLowerCase()
    const members = document.getElementById("npc-filterMembers").value
    const limMin  = parseInt(document.getElementById("npc-filterLimit").value) || 0

    npcFiltrados = npcItens.filter(it => {
        if (busca && !it.name.toLowerCase().includes(busca)) return false
        if (members !== "" && String(it.members) !== members) return false
        if (it.limit < limMin) return false
        return true
    })
    npcFiltrados.sort((a, b) => {
        let va = a[npcSortCol], vb = b[npcSortCol]
        if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase() }
        return va < vb ? (npcSortAsc ? -1 : 1) : va > vb ? (npcSortAsc ? 1 : -1) : 0
    })
    npcPag = 0
    renderNPC()
}


const bonusLabels = {
  astab:'Attack Stab', aslash:'Attack Slash', acrush:'Attack Crush', amag:'Attack Magic', arang:'Attack Ranged',
  dstab:'Def Stab', dslash:'Def Slash', dcrush:'Def Crush', dmag:'Def Magic', drang:'Def Ranged',
  str:'Melee Str', rstr:'Ranged Str', mdmg:'Magic Dmg', prayer:'Prayer'
};



async function buscarBonuses(itemId) {
    const idStr = String(itemId);
    if (bonusCache[idStr] !== undefined) return bonusCache[idStr];
    
    const nome = MAPPING.find(m => parseInt(m.id) === parseInt(itemId))?.name;
    if (!nome) return bonusCache[idStr] = null;
    
    try {
        const res = await fetch(`https://oldschool.runescape.wiki/api.php?action=parse&page=${encodeURIComponent(nome)}&prop=wikitext&format=json`);
        const data = await res.json();
        const text = data.parse?.wikitext?.['*'] || '';
        
        const bonuses = {};
        const prefixes = ['astab','aslash','acrush','amag','arang','dstab','dslash','dcrush','dmag','drang','str','rstr','mdmg','prayer'];
        prefixes.forEach(prefix => {
            const m = text.match(new RegExp(`\\|${prefix}\\s*=\\s*([+-]?\\d+)`, 'i'));
            if (m) bonuses[prefix] = parseInt(m[1]);
        });
        
        bonusCache[idStr] = Object.keys(bonuses).length ? bonuses : null;
        return bonusCache[idStr];
    } catch(e) {
        console.error(e);
        bonusCache[idStr] = null;
        return null;
    }
}





function renderBonuses(data, rowId) {
    const row = document.getElementById(rowId)
    if (!row) return
    if (!data || !data.attack_stab) {
        row.querySelector('td').innerHTML = '<span class="loading-bonus">Sem dados de bonus para este item</span>'
        return
    }
    const sections = [
        { title: 'Ataque', fields: [
            ['Stab', data.attack_stab],
            ['Slash', data.attack_slash],
            ['Crush', data.attack_crush],
            ['Magic', data.attack_magic],
            ['Ranged', data.attack_ranged]
        ]},
        { title: 'Defesa', fields: [
            ['Stab', data.defence_stab],
            ['Slash', data.defence_slash],
            ['Crush', data.defence_crush],
            ['Magic', data.defence_magic],
            ['Ranged', data.defence_ranged]
        ]},
        { title: 'Outros', fields: [
            ['Str Melee', data.melee_strength],
            ['Str Ranged', data.ranged_strength],
            ['Str Magic', data.magic_damage],
            ['Prayer', data.prayer]
        ]}
    ]
    row.querySelector('td').innerHTML = `<div class="bonus-grid">${
        sections.map(s => `
            <div class="bonus-section">
                <div class="bonus-section-title">${s.title}</div>
                ${s.fields.map(([label, val]) => {
                    if (val === undefined || val === null) return ''
                    const cls = val > 0 ? 'pos' : val < 0 ? 'neg' : 'muted'
                    const sign = val > 0 ? '+' : ''
                    return `<div class="bonus-item"><span>${label}</span><span class="${cls}">${sign}${val}</span></div>`
                }).join('')}
            </div>`).join('')
    }</div>`
}

async function toggleBonus(itemId, btnEl) {
    const rowId = `bonus-row-${itemId}`
    let row = document.getElementById(rowId)
    if (row) {
        const vis = row.style.display !== 'none'
        row.style.display = vis ? 'none' : ''
        btnEl.textContent = vis ? '▶ Bonuses' : '▼ Fechar'
        return
    }
    const tr = btnEl.closest('tr')
    row = document.createElement('tr')
    row.id = rowId
    row.className = 'bonus-row'
    row.innerHTML = `<td colspan="7"><span class="loading-bonus">Carregando bonuses...</span></td>`
    tr.after(row)
    btnEl.textContent = '▼ Fechar'
    const data = await buscarBonuses(itemId)
    renderBonuses(data, rowId)
}


async function showBonuses(itemId, btn) {
    const div = document.getElementById('bonuses-'+itemId);
    if (div.style.display !== 'none') {
        div.style.display = 'none';
        btn.textContent = '▶ Bonuses';
        return;
    }
    
    div.style.display = 'block';
    btn.textContent = '▼ Bonuses';
    div.innerHTML = 'Carregando...';
    
    const data = await buscarBonuses(itemId);
    if (!data || Object.keys(data).length === 0) {
        div.innerHTML = 'Sem bonuses';
        return;
    }
    
    let html = '';
    for (let [prefix, val] of Object.entries(data)) {
        const label = bonusLabels[prefix] || prefix;
        const sign = val > 0 ? '+' : '';
        const cls = val > 0 ? 'pos' : val < 0 ? 'neg' : 'muted';
        html += `<div style="display:flex;justify-content:space-between;"><span>${label}</span><span class="${cls}">${sign}${val}</span></div>`;
    }
    div.innerHTML = html;
}



function renderNPC() {
    const inicio = npcPag * POR_PAGINA
    const pagina = npcFiltrados.slice(inicio, inicio + POR_PAGINA)
    const totalPags = Math.ceil(npcFiltrados.length / POR_PAGINA)

    document.getElementById("npc-contador").textContent = `${npcFiltrados.length} itens encontrados`
    document.getElementById("npc-pag-info").textContent = `Página ${npcPag + 1} de ${totalPags || 1}`

    document.getElementById("npc-tbl").innerHTML = pagina.length === 0
        ? `<tr><td colspan="7" class="empty" style="text-align:center">Nenhum item encontrado</td></tr>`
        : pagina.map(it => `<tr>
<td>
    <a href="https://oldschool.runescape.wiki/w/${it.name.replace(/ /g,'_')}" target="_blank" style="color:#f0d080"><b>${it.name}</b></a>
    <br><span style="color:#4a3820;font-size:0.75rem">${it.examine}</span>
    <button class="bonus-toggle" onclick="showBonuses(${it.id},this)">▶ Bonuses</button>
    <div id="bonuses-${it.id}" style="display:none;margin-top:4px;padding:4px;background:#120c00;border:1px solid #3a2210;border-radius:2px;font-size:0.7rem;"></div>
</td>

        </tr>`).join("")
}

function sortNPC(col) {
    if (npcSortCol === col) npcSortAsc = !npcSortAsc
    else { npcSortCol = col; npcSortAsc = true }
    aplicarFiltrosNPC()
}
function mudarPaginaNPC(dir) {
    const total = Math.ceil(npcFiltrados.length / POR_PAGINA)
    npcPag = Math.max(0, Math.min(total - 1, npcPag + dir))
    renderNPC()
}

// GE
let geItens = [], geFiltrados = [], gePag = 0, geSortCol = 'margin', geSortAsc = false

async function carregarGE() {
    document.getElementById('ge-status').textContent = "Baixando GE..."
    try {
        const [mappingData, latestRes, volumeRes] = await Promise.all([
            carregarMapping(),
            fetch("https://prices.runescape.wiki/api/v1/osrs/latest", { headers: { "User-Agent": "osrs-explorer/1.0 - github.com/leronzoo" } }),
            fetch("https://prices.runescape.wiki/api/v1/osrs/volumes", { headers: { "User-Agent": "osrs-explorer/1.0 - github.com/leronzoo" } })
        ])
        const latest  = (await latestRes.json()).data
        const volumes = (await volumeRes.json()).data

        const byId = {}
        mappingData.forEach(it => byId[it.id] = it)

        geItens = []
        for (const [id, p] of Object.entries(latest)) {
            const base = byId[id]
            if (!base) continue
            const high   = p.high || 0
            const low    = p.low  || 0
            const margin = high - low
            const vol    = volumes[id] || 0
            geItens.push({
                id: parseInt(id), name: base.name || "",
                members: base.members || false, limit: base.limit || 0,
                high, low, margin, volume: vol
            })
        }
        document.getElementById('ge-status').textContent = `✓ ${geItens.length} itens`
        aplicarFiltrosGE()
    } catch(e) {
        document.getElementById('ge-status').textContent = "Erro: " + e.message
    }
}

function aplicarFiltrosGE() {
    const busca     = document.getElementById("ge-search").value.toLowerCase()
    const members   = document.getElementById("ge-filterMembers").value
    const marginMin = parseInt(document.getElementById("ge-filterMargin").value) || 0

    geFiltrados = geItens.filter(it => {
        if (busca && !it.name.toLowerCase().includes(busca)) return false
        if (members !== "" && String(it.members) !== members) return false
        if (it.margin < marginMin) return false
        return true
    })
    geFiltrados.sort((a, b) => {
        let va = a[geSortCol], vb = b[geSortCol]
        if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase() }
        return va < vb ? (geSortAsc ? -1 : 1) : va > vb ? (geSortAsc ? 1 : -1) : 0
    })
    gePag = 0
    renderGE()
}

function renderGE() {
    const inicio = gePag * POR_PAGINA
    const pagina = geFiltrados.slice(inicio, inicio + POR_PAGINA)
    const totalPags = Math.ceil(geFiltrados.length / POR_PAGINA)

    document.getElementById("ge-contador").textContent = `${geFiltrados.length} itens encontrados`
    document.getElementById("ge-pag-info").textContent = `Página ${gePag + 1} de ${totalPags || 1}`

    document.getElementById("ge-tbl").innerHTML = pagina.length === 0
        ? `<tr><td colspan="7" class="empty" style="text-align:center">Nenhum item encontrado</td></tr>`
        : pagina.map(it => `<tr>
            <td>
                <a href="https://oldschool.runescape.wiki/w/${it.name.replace(/ /g,'_')}" target="_blank" style="color:#f0d080;text-decoration:none;"><b>${it.name}</b></a>
            </td>
            <td><span class="badge ${it.members ? 'badge-members' : 'badge-free'}">${it.members ? 'Members' : 'F2P'}</span></td>
            <td>${it.high > 0 ? `<span class="gp">${it.high.toLocaleString()} gp</span>` : `<span class="muted">—</span>`}</td>
            <td>${it.low  > 0 ? `<span class="gp">${it.low.toLocaleString()} gp</span>`  : `<span class="muted">—</span>`}</td>
            <td><span class="${it.margin > 0 ? 'margin-pos' : 'margin-neg'}">${it.margin > 0 ? '+' : ''}${it.margin.toLocaleString()} gp</span></td>
            <td>${it.volume > 0 ? `<span class="vol">${it.volume.toLocaleString()}</span>` : `<span class="muted">—</span>`}</td>
            <td>${it.limit > 0 ? `<span class="gp">${it.limit.toLocaleString()}</span>` : `<span class="muted">—</span>`}</td>
        </tr>`).join("")
}

function sortGE(col) {
    if (geSortCol === col) geSortAsc = !geSortAsc
    else { geSortCol = col; geSortAsc = col === 'name' ? true : false }
    aplicarFiltrosGE()
}
function mudarPaginaGE(dir) {
    const total = Math.ceil(geFiltrados.length / POR_PAGINA)
    gePag = Math.max(0, Math.min(total - 1, gePag + dir))
    renderGE()
}

// eventos
document.getElementById("npc-search").addEventListener("input", aplicarFiltrosNPC)
document.getElementById("npc-filterMembers").addEventListener("change", aplicarFiltrosNPC)
document.getElementById("npc-filterLimit").addEventListener("input", aplicarFiltrosNPC)
document.getElementById("ge-search").addEventListener("input", aplicarFiltrosGE)
document.getElementById("ge-filterMembers").addEventListener("change", aplicarFiltrosGE)
document.getElementById("ge-filterMargin").addEventListener("input", aplicarFiltrosGE)
</script>
</body>
